name: iOS Build IPA

on:
  push:
    branches: [ ios ]
  pull_request:
    branches: [ ios ]
  workflow_dispatch:

env:
  SCHEME: CompositionHelper
  PROJECT: CompositionHelper.xcodeproj

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Show Xcode version
      run: xcodebuild -version

    - name: List schemes
      run: xcodebuild -project "$PROJECT" -list

    - name: Build Release .app
      run: |
        BUILD_DIR=$RUNNER_TEMP/build
        xcodebuild build \
          -project "$PROJECT" \
          -scheme "$SCHEME" \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          -derivedDataPath "$BUILD_DIR" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="-" \
          2>&1 | tee $RUNNER_TEMP/build.log | tail -50
        echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV

    - name: Find .app and create IPA
      run: |
        echo "=== Searching for .app ==="
        find "$BUILD_DIR" -name "*.app" -type d 2>/dev/null

        APP_PATH=$(find "$BUILD_DIR" -name "*.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          echo "❌ .app not found"
          echo "=== Build directory contents ==="
          find "$BUILD_DIR" -maxdepth 5 -type d
          echo "=== Last 100 lines of build log ==="
          tail -100 $RUNNER_TEMP/build.log
          exit 1
        fi

        echo "✅ Found: $APP_PATH"
        mkdir -p $RUNNER_TEMP/Payload
        cp -r "$APP_PATH" $RUNNER_TEMP/Payload/
        cd $RUNNER_TEMP
        zip -r CompositionHelper.ipa Payload
        echo "✅ IPA created: $(du -h CompositionHelper.ipa | cut -f1)"

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: CompositionHelper-unsigned
        path: ${{ runner.temp }}/CompositionHelper.ipa
        retention-days: 30
